; ESP32 Physical Terminal for Murderhouse
; PlatformIO Project Configuration

[env:esp32]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; OTA-capable dual-app partition layout (3.1MB per app, 8MB flash)
board_build.partitions = default_8MB.csv

; Library dependencies
lib_deps =
    olikraus/U8g2@^2.35.7
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.3
    adafruit/Adafruit NeoPixel@^1.11.0
    madhephaestus/ESP32Encoder@^0.11.6

; Serial monitor
monitor_speed = 115200

; Flash mode — explicit DIO required for reliable OTA on ESP32-S3
; (QIO causes esp_image_verify read-back failures, see espressif/esp-idf#8509)
board_build.flash_mode = dio

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=1

; Upload settings (adjust port as needed)
; upload_port = COM3
; upload_speed = 921600
